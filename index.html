let DB={}, MONTHS=[];
const AC={AAPL:"#1d4ed8",SPY:"#0f766e",GLD:"#b45309",NVDA:"#6d28d9",BTC:"#d97706",EURUSD:"#0369a1"};
const PAL=["#3b82f6","#ef4444","#10b981","#f59e0b","#8b5cf6","#06b6d4","#f97316","#84cc16","#ec4899","#6366f1","#14b8a6","#a855f7"];

function tsToLabel(ts){
  const d=new Date(ts*1000);
  return d.toLocaleString('en-US',{month:'short',year:'2-digit'}).replace(' ','\'').replace(', '," '");
}

function setDK(key){
  const s0 = DB[key].livePrice ?? DB[key].hist[DB[key].hist.length-1];
  if(key==="BTC")DB[key].dK=Math.round(s0/5000)*5000;
  else if(key==="EURUSD")DB[key].dK=parseFloat((Math.round(s0*20)/20).toFixed(2));
  else DB[key].dK=Math.round(s0/10)*10;
}

function hideOverlay(){
  const ol=document.getElementById("loadingOverlay");
  ol.classList.add("hidden");
  setTimeout(()=>ol.style.display="none",450);
}

function getRollingThreeYearRange(){
  const today = new Date();
  const toDate = new Date(today);
  const fromDate = new Date(today);
  fromDate.setFullYear(fromDate.getFullYear() - 3);

  return {
    from: Math.floor(fromDate.getTime() / 1000),
    to: Math.floor(toDate.getTime() / 1000),
    fromDate,
    toDate
  };
}

function getHistoryCountText(count){
  return `${count} monthly end-of-month closing prices · rolling 3-year window`;
}

async function apiGet(params2){
  const qs=new URLSearchParams(params2).toString();
  const r=await fetch(`/api/market?${qs}`);
  if(!r.ok) throw new Error(`/api/market ${r.status}`);
  return r.json();
}

async function loadLiveData(){
  try{
    const { from, to } = getRollingThreeYearRange();
    const keys = Object.keys(DB_META);

    const requests = [
      apiGet({ type:"sofr" }),
      ...keys.map(k => apiGet({
        type:"candle",
        sym: DB_META[k].finnSym,
        res:"M",
        from,
        to
      })),
      ...keys.map(k => apiGet({
        type:"quote",
        sym: DB_META[k].finnSym
      }))
    ];

    const all = await Promise.all(requests);

    const sofrData = all[0];
    const candleArr = all.slice(1, 1 + keys.length);
    const quoteArr = all.slice(1 + keys.length);

    if (sofrData?.data?.length) params.r = sofrData.data[sofrData.data.length-1].value/100;

    if (!candleArr[0] || !Array.isArray(candleArr[0].t) || !candleArr[0].t.length) {
      throw new Error("No candle timeline returned");
    }

    MONTHS = candleArr[0].t.map(tsToLabel);

    keys.forEach((key, i) => {
      const d = candleArr[i];
      if (!d || d.s === "no_data" || !d.c || !d.c.length) {
        throw new Error(`no candle data: ${key}`);
      }

      const hist = d.c.map(Number);
      const lastMonthlyClose = hist[hist.length - 1];
      const q = quoteArr[i];

      const livePrice =
        (q && Number.isFinite(Number(q.c)) && Number(q.c) > 0)
          ? Number(q.c)
          : lastMonthlyClose;

      DB[key] = {
        ...DB_META[key],
        hist,
        lastMonthlyClose,
        livePrice,
        asOfPrice: livePrice
      };

      setDK(key);
    });

    params.K=DB[sel].dK;
    const sl=MONTHS[0], el=MONTHS[MONTHS.length-1];
    document.getElementById("dataLabel").innerHTML=
      `<span class="live-badge"><span class="live-dot"></span>Live</span> &nbsp;Finnhub &nbsp;·&nbsp; Monthly history ${sl} – ${el} &nbsp;|&nbsp; Spot updated today`;
    hideOverlay();
    render();
  }catch(err){
    console.warn("Live fetch failed, using fallback:",err.message);
    useFallback();
  }
}

function useFallback(){
  MONTHS=FB.months;
  params.r=FB.sofr;
  ["AAPL","SPY","GLD","NVDA","BTC","EURUSD"].forEach(k=>{
    const hist = FB[k];
    const lastMonthlyClose = hist[hist.length-1];
    DB[k]={
      ...DB_META[k],
      hist,
      lastMonthlyClose,
      livePrice:lastMonthlyClose,
      asOfPrice:lastMonthlyClose
    };
    setDK(k);
  });
  params.K=DB[sel].dK;
  const el=MONTHS[MONTHS.length-1];
  document.getElementById("dataLabel").innerHTML=
    `<span class="off-badge">Offline data</span> &nbsp;Fallback static dataset &nbsp;·&nbsp; ${MONTHS[0]} – ${el}`;
  hideOverlay();
  render();
}

function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function cal(hist){
  const lr=hist.slice(1).map((p,i)=>Math.log(p/hist[i]));
  const mn=lr.reduce((a,b)=>a+b,0)/lr.length;
  const vr=lr.reduce((a,r)=>a+(r-mn)**2,0)/(lr.length-1);
  return{mu:mn*12,sigma:Math.sqrt(vr)*Math.sqrt(12),lr,stdM:Math.sqrt(vr)};
}
function fmtP(k,p){
  if(k==="BTC")return p>=1000?`$${(p/1000).toFixed(1)}k`:`$${p.toFixed(0)}`;
  if(k==="EURUSD")return p.toFixed(4);
  return`$${p.toFixed(DB[k].decimals)}`;
}
function fmtPay(k,p){
  if(k==="BTC")return p>=1000?`${(p/1000).toFixed(1)}k`:`${p.toFixed(0)}`;
  if(k==="EURUSD")return p.toFixed(4);
  return p.toFixed(2);
}
function fmtY(k,v){
  if(k==="BTC")return`${(v/1000).toFixed(0)}k`;
  if(k==="EURUSD")return v.toFixed(3);
  return v.toFixed(0);
}

function el(tag,attrs,inner){
  const e=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="className")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  if(inner!==undefined){
    if(typeof inner==="string"||typeof inner==="number")e.innerHTML=inner;
    else if(Array.isArray(inner))inner.filter(Boolean).forEach(c=>e.appendChild(c));
    else e.appendChild(inner);
  }
  return e;
}
function eqRow(expr,indent,note){
  const row=el("div",{className:"eq-row"+(indent?" ind":"")});
  row.innerHTML=`<span class="eq-expr">${expr}</span>${note?`<span class="eq-note">${note}</span>`:""}`;
  return row;

function runMC(){
  if(running)return;
  running=true;renderSim();
  setTimeout(()=>{
    const a=DB[sel],c=cal(a.hist),S0=a.livePrice ?? a.hist[a.hist.length-1];
    const{K,T,nSteps,r}=params,σ=c.sigma,dt=T/nSteps,sqDt=Math.sqrt(dt),drift=r-0.5*σ*σ;
    const NS=14,skip=Math.max(1,Math.floor(nSteps/60));
    const rawP=Array.from({length:NS},()=>[{t:0,S:S0}]);
    let sumPV=0,sumPV2=0;const pays=[];
    for(let p=0;p<params.nPaths;p++){
      let S=S0,cumS=0;
      for(let i=1;i<=nSteps;i++){
        S*=Math.exp(drift*dt+σ*sqDt*randn());
        cumS+=S;
        if(p<NS&&i%skip===0)rawP[p].push({t:i*dt,S:+S.toFixed(a.decimals+2)});
      }
      const pay=Math.max(cumS/nSteps-K,0);
      const pv=Math.exp(-r*T)*pay;sumPV+=pv;sumPV2+=pv*pv;pays.push(pay);
    }
    const price=sumPV/params.nPaths,
          se=Math.sqrt((sumPV2/params.nPaths-price*price)/params.nPaths),
          ci=[price-1.96*se,price+1.96*se];
    const pos=pays.filter(x=>x>0),zeros=pays.length-pos.length;
    const maxP=pos.length?Math.max(...pos.slice(0,8000)):1,nb=22,bw=maxP/nb;
    const cnts=new Array(nb).fill(0);
    for(const p of pos)cnts[Math.min(Math.floor(p/bw),nb-1)]++;
    const histD=[{label:"0 (OTM)",cnt:zeros}];
    for(let i=0;i<nb;i++)if(cnts[i]>0)histD.push({label:fmtPay(sel,i*bw),cnt:cnts[i]});
    const mL=Math.max(...rawP.map(p=>p.length));
    const pathD=Array.from({length:mL},(_,i)=>({t:rawP[0][i]?.t??0,vals:rawP.map(p=>p[i]?.S??null)}));
    results={price,se,ci,histD,zeros,K,T,r,nPaths:params.nPaths,S0,c,pathD,σ,θ:(c.mu-r)/σ,key:sel};
    running=false;tab="sim";render();
  },30);
}

function renderTheory(){

        eqRow(`<span class="math cSig">Ā</span><sub>T</sub> = <sup>1</sup>/<sub>n</sub> · ∑<sub>k=1</sub><sup>n</sup> ${SS}(t<sub>k</sub>)`,true,"discrete arithmetic average (n observation points)"),
        eqRow(`${SS}<sub>0</sub> = ${fmtP(sel,S0)}, &ensp; <span class="math cMu">K</span> = ${fmtP(sel,params.K)}, &ensp; T = ${params.T} yr, &ensp; n = ${params.nSteps}`,true,"current settings"))},

    {n:2,col:"#b45309",title:"Real-World Measure ℙ (Physical Measure)",
      body:`Under ℙ, the price drifts at the historically observed rate μ̂ = ${μ}%/yr. This is what investors actually observe in the market.`,
      eq:eqBox(false,
        eqRow(`d${SS}<sub>t</sub> = ${MU}${SS}<sub>t</sub> dt + ${SIG}${SS}<sub>t</sub> d${WW}<sup>${PP}</sup><sub>t</sub>`,false,`${a.label} GBM under ℙ`),
        eqRow(`${MU} = ${μ}%/yr, &ensp; ${SIG} = ${σ}%/yr`,true,`calibrated from ${a.hist.length} monthly log-returns`),

    {n:3,col:"#0e7490",title:"Numeraire — Money-Market Account Bₜ",
      body:`The <strong>numeraire</strong> is the risk-free money-market account B<sub>t</sub>, growing deterministically at SOFR r = ${r}%/yr. Dividing all prices by B<sub>t</sub> converts them to <strong>present-value units</strong>. The discounted price X<sub>t</sub> = S<sub>t</sub>/B<sub>t</sub> still has non-zero drift μ̂ − r under ℙ, so it is <em>not</em> a ℙ-martingale — this non-zero excess return motivates the Girsanov measure change.`,
      eq:eqBox(false,
        eqRow(`${BB}<sub>t</sub> = e<sup>${RR}t</sup>, &ensp; d${BB}<sub>t</sub> = ${RR}${BB}<sub>t</sub> dt`,false,"numeraire (risk-free bond)"),

        eqRow(`μ̂ − r = ${μ}% − ${r}% = <span class="math cTh bold">${((c.mu-params.r)*100).toFixed(2)}% ≠ 0</span>`,true,"non-zero drift ⟹ Xₜ is not a ℙ-martingale"))},

      eq:eqBox(false,

      eq:eqBox(false,

      eq:eqBox(true,
        eqRow(`d${SS}<sub>t</sub> = ${MU}${SS}<sub>t</sub> dt + ${SIG}${SS}<sub>t</sub> d${WW}<sup>${PP}</sup><sub>t</sub>`,false,"start: SDE under ℙ"),

          eqRow(`( μ̂ − σ̂θ = ${μ}% − ${σ}% × ${θ.toFixed(4)} = ${r}% )`,true,`μ̂ = ${μ}%  →  r = ${r}%`)))},

    {n:8,col:"#0f766e",title:"Martingale Property — FTAP",
      body:"Under ℚ, X<sub>t</sub> = S<sub>t</sub>/B<sub>t</sub> is a pure diffusion (zero drift), i.e. a true ℚ-martingale. This is the Harrison–Kreps–Pliska Fundamental Theorem of Asset Pricing.",
      eq:eqBox(false,
        eqRow(`dX<sub>t</sub> = ${SIG}X<sub>t</sub> d${WW}<sup>${QQ}</sup><sub>t</sub> &ensp; <span class="iNote">(drift = 0 ⟹ ℚ-martingale)</span>`,false,"discounted price under ℚ"),
        eqRow(`𝔼<sup>${QQ}</sup>[ S<sub>T</sub>/B<sub>T</sub> | ℱ<sub>t</sub> ] = S<sub>t</sub>/B<sub>t</sub> ✓`,true,"ℚ-martingale property"),
        eqRow(`No-arbitrage ⟺ ∃ equivalent martingale measure <span class="math cQ bold">ℚ</span> ✓`,true,"FTAP (Harrison–Kreps–Pliska)"))},

    {n:9,col:"#1e3a5f",title:"Risk-Neutral Pricing Formula",
      body:`By FTAP, the no-arbitrage value of any attainable derivative is the discounted ℚ-expectation of its payoff. Because the discounted price process is a ℚ-martingale under the money-market numeraire, the derivative value equals the discounted ℚ-expectation of its terminal payoff. The physical drift μ̂ = ${μ}% disappears entirely — two investors with different views on ${a.label}'s expected return agree on the option price.`,
      eq:eqBox(true,keyBox(
        eqRow(`V<sub>t</sub> = B<sub>t</sub> · 𝔼<sup>${QQ}</sup>[ Λ<sub>T</sub> / B<sub>T</sub> | ℱ<sub>t</sub> ]`,false,"martingale pricing formula  ★"),
        eqRow(`V<sub>0</sub> = e<sup>−rT</sup> · 𝔼<sup>${QQ}</sup>[ max( <span class="math cSig">Ā</span><sub>T</sub> − K, 0 ) ]`,true,"at t = 0, substituting B<sub>T</sub> = e<sup>rT</sup>"),

          <div class="pvq-pane" style="border-left:2px dashed #e2e8f0">
            <div class="pvq-label" style="color:#3730a3">Risk-Neutral ℚ &nbsp;(drift = r = ${r}%)</div>
            <div class="chart-wrap" style="height:170px"><canvas id="cPvQ"></canvas></div>
          </div>
        </div>`;
      frag.appendChild(d);
      frag.appendChild(pvqCard);
      return;
    }
    frag.appendChild(d);
  });

  const ct=document.getElementById("content");ct.innerHTML="";ct.appendChild(frag);

  requestAnimationFrame(()=>{
    const a2=DB[sel],c2=cal(a2.hist),S0_2=a2.livePrice ?? a2.hist[a2.hist.length-1];
    const T2=params.T,n2=80,dt2=T2/n2,sqDt2=Math.sqrt(dt2),NS2=10;
    const Zs=Array.from({length:NS2},()=>Array.from({length:n2},()=>randn()));
    function makePaths(drift){
      return Zs.map(zs=>{
        const pts=[S0_2];let S=S0_2;
        for(const z of zs){S*=Math.exp((drift-0.5*c2.sigma**2)*dt2+c2.sigma*sqDt2*z);pts.push(S);}
        return pts;
      });
    }
    const tLabels=Array.from({length:n2+1},(_,i)=>(i*dt2).toFixed(2));
    function drawPvQ(canvasId,paths,color){
      dc(canvasId);
      const ctx=document.getElementById(canvasId);
      if(!ctx)return;
      charts[canvasId]=new Chart(ctx,{type:"line",
        data:{labels:tLabels,datasets:paths.map((p,j)=>({
          data:p,borderColor:color+(["cc","aa","99","88","77","66","55","44","33","22"][j]),
          borderWidth:1.3,pointRadius:0,fill:false,tension:0.1,spanGaps:true
        }))},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:0},
          plugins:{legend:{display:false},tooltip:{enabled:false}},
          scales:{
            x:{ticks:{font:{size:8},maxTicksLimit:6},
               title:{display:true,text:"Time t (yr)",font:{size:10}}},
            y:{ticks:{font:{size:9},callback:v=>fmtY(sel,v)},
               title:{display:true,text:`Price (${a2.currency||"USD"})`,font:{size:10}},
               min:S0_2*0.4,max:S0_2*2.2}
          }
        }
      });
    }
    drawPvQ("cPvP",makePaths(c2.mu),"#b45309");
    drawPvQ("cPvQ",makePaths(params.r),"#3730a3");
  });
}

function renderSim(){
  const a=DB[sel],ac=AC[sel],c=cal(a.hist),S0=a.livePrice ?? a.hist[a.hist.length-1];
  const θ=(c.mu-params.r)/c.sigma;
  const endLabel=MONTHS[MONTHS.length-1];
  const historyCount = a.hist.length;
  const frag=document.createDocumentFragment();

  const strip=el("div",{className:"cal-strip",style:{background:`${ac}0d`,border:`1px solid ${ac}30`}});
  strip.innerHTML=`<h3 style="font-size:14px;font-weight:700;color:${ac};font-family:sans-serif;margin-bottom:10px">${a.emoji} ${a.label} · Calibrated Parameters (locked — used in MC)</h3>`;
  const sg=el("div",{className:"cal-grid"});
  [{sym:`${SS}<sub>0</sub>`,val:fmtP(sel,S0),sub:"Live spot"},
   {sym:"M close",val:fmtP(sel,a.lastMonthlyClose ?? a.hist[a.hist.length-1]),sub:"Last monthly close"},
   {sym:SIG,val:`${(c.sigma*100).toFixed(2)}%`,sub:"Realized volatility"},
   {sym:MU,val:`${(c.mu*100).toFixed(2)}%`,sub:"Physical drift"},
   {sym:RR,val:`${(params.r*100).toFixed(2)}%`,sub:"Risk-free rate"},
  ].forEach(({sym,val,sub})=>{
    const ci=el("div",{className:"cal-item",style:{border:`1px solid ${ac}30`}});
    ci.innerHTML=`<div class="cal-sym">${sym}</div>
      <div class="cal-val" style="color:${ac}">${val}</div>
      <div class="cal-sub">${sub}</div>`;
    sg.appendChild(ci);
  });
  strip.appendChild(sg);frag.appendChild(strip);

  const pc=card("#0369a1");
  pc.appendChild(el("h3",{className:"card-title",style:{marginBottom:"16px"}},"Option & Simulation Parameters"));
  const pg=el("div",{className:"param-grid"});
  [{k:"K",lbl:`<span class="math cMu">K</span> &nbsp;Strike (${a.currency||"USD"})`,step:sel==="BTC"?500:sel==="EURUSD"?0.005:5,min:0},
   {k:"T",lbl:`<span class="math">T</span> &nbsp;Maturity (yr)`,step:0.25,min:0.25},
   {k:"r",lbl:`${RR} &nbsp;Risk-free rate`,step:0.001,min:0},
   {k:"nSteps",lbl:`<span class="math">n</span> &nbsp;Observation points`,step:20,min:20},
   {k:"nPaths",lbl:`<span class="math">N</span> &nbsp;MC paths`,step:5000,min:1000},
  ].forEach(({k,lbl,step,min})=>{
    const div=document.createElement("div");
    const lbl2=el("label",{style:{display:"block",fontSize:"13px",color:"#334155",marginBottom:"5px",fontFamily:"'Cambria Math',Georgia,serif"}},lbl);
    const inp=el("input",{type:"number",step,min,value:params[k],className:"param-input"});
    inp.oninput=e=>{const v=parseFloat(e.target.value);if(!isNaN(v))params[k]=v;};
    div.appendChild(lbl2);div.appendChild(inp);pg.appendChild(div);
  });
  const lock=el("div",{style:{padding:"14px 10px",background:"#f8fafc",borderRadius:"8px",border:"1px solid #e2e8f0",textAlign:"center",fontSize:"12px",color:"#94a3b8",fontFamily:"sans-serif",lineHeight:1.7}});
  lock.innerHTML=`${SIG} and ${MU}<br>locked to data<br>MC drifts at ${RR} only`;
  pg.appendChild(lock);pc.appendChild(pg);
  const warn=el("div",{className:"warn-box"});
  warn.innerHTML=`<strong>Key insight:</strong> Physical drift <strong class="math">μ̂ = ${(c.mu*100).toFixed(2)}%</strong> does <em>not</em> enter the MC simulation. Paths drift at <strong class="math">r = ${(params.r*100).toFixed(2)}%</strong> under <strong class="math">ℚ</strong> — this is the essence of Girsanov's theorem.`;
  pc.appendChild(warn);frag.appendChild(pc);

  const btn=el("button",{className:"run-btn"});
  if(running){btn.disabled=true;btn.style.background="#94a3b8";btn.textContent="⏳  Simulating…";}
  else{
    btn.style.background=`linear-gradient(135deg,${ac},#1e40af)`;
    btn.style.boxShadow="0 3px 12px rgba(30,64,175,0.4)";
    btn.textContent=`${a.emoji}  Run Monte Carlo  (N = ${params.nPaths.toLocaleString()} paths)`;
    btn.onclick=runMC;
  }
  frag.appendChild(btn);

  if(results&&results.key===sel){
    const R=results,c2=R.c,θ2=R.θ;
    const μ2=(c2.mu*100).toFixed(2),σ2=(c2.sigma*100).toFixed(2),rv=(R.r*100).toFixed(2);

    frag.appendChild(el("div",{className:"section-sep"},"RESULTS"));

    const mg=el("div",{className:"metrics-grid"});
    [{lbl:`Option price &nbsp;<span class="math cRes bold">V̂</span><sub>0</sub>`,val:fmtP(R.key,R.price),bg:"#eff6ff",bd:"#bfdbfe",c:"#1e40af",sz:18},
     {lbl:"95% Confidence Interval",val:`[${fmtP(R.key,R.ci[0])}, ${fmtP(R.key,R.ci[1])}]`,bg:"#f0fdf4",bd:"#bbf7d0",c:"#166534",sz:13},
     {lbl:"Standard Error",val:fmtP(R.key,R.se),bg:"#faf5ff",bd:"#e9d5ff",c:"#6b21a8",sz:14},
     {lbl:`Girsanov &nbsp;${TH} = (μ̂−r)/σ̂`,val:θ2.toFixed(4),bg:"#fff7ed",bd:"#fed7aa",c:"#9a3412",sz:14},
    ].forEach(({lbl,val,bg,bd,c:col,sz})=>{
      const box=el("div",{className:"metric-box",style:{background:bg,border:`1px solid ${bd}`}});
      box.innerHTML=`<div class="metric-label">${lbl}</div>
        <div class="metric-val" style="color:${col};font-size:${sz}px">${val}</div>`;
      mg.appendChild(box);
    });
    frag.appendChild(mg);

    const pathCard=card("#3730a3");
    pathCard.appendChild(el("h3",{className:"card-title"},
      `${a.emoji} Simulated Paths under ℚ &nbsp;<span style="font-weight:400;font-size:12px;color:#94a3b8">drift = r = ${rv}%,  not μ̂ = ${μ2}%</span>`));
    const cw1=el("div",{className:"chart-wrap",style:{height:"240px"}});
    cw1.appendChild(el("canvas",{id:"cPaths"}));
    pathCard.appendChild(cw1);frag.appendChild(pathCard);

    const payCard=card("#0369a1");
    payCard.appendChild(el("h3",{className:"card-title"},
      `Payoff Distribution &nbsp;<span style="font-weight:400;font-size:12px;color:#94a3b8;font-family:'Cambria Math',Georgia,serif">max(Ā<sub>T</sub> − ${fmtP(R.key,R.K)}, 0)</span>`));
    payCard.appendChild(el("p",{className:"card-sub"},
      `${((R.zeros/R.nPaths)*100).toFixed(1)}% expired OTM (zero payoff) · Positive payoffs are right-skewed`));
    const cw2=el("div",{className:"chart-wrap",style:{height:"200px"}});
    cw2.appendChild(el("canvas",{id:"cPayoff"}));
    payCard.appendChild(cw2);frag.appendChild(payCard);

    const sc=card("#1e3a5f","#f8fafc");
    sc.appendChild(el("h3",{className:"card-title",style:{marginBottom:"14px"}},
      `${a.emoji} ${a.label} — Full Pricing Chain`));
    const stbl=el("table",{className:"sum-table"});const stb=el("tbody");
    [["Underlying",`${a.emoji} ${a.label} (${a.name}) · S₀ = ${fmtP(R.key,R.S0)} (live spot)`],
     ["Monthly chart endpoint",`${fmtP(R.key,a.lastMonthlyClose ?? a.hist[a.hist.length-1])} (${endLabel})`],
     ["Derivative","Arithmetic Asian call, path-dependent, no closed-form solution"],
     [`${MU} Physical drift`,`${μ2}%/yr <span class="iNote">(${historyCount}-month log-returns)</span>`],
     [`${SIG} Realized volatility`,`${σ2}%/yr <span class="iNote">(monthly std dev ${(c2.stdM*100).toFixed(2)}% × √12)</span>`],
     [`${RR} Risk-free rate (SOFR)`,`${rv}%/yr`],
     [`Girsanov kernel ${TH}`,`(${μ2}% − ${rv}%) / ${σ2}% = <span class="math cTh bold">${θ2.toFixed(4)}</span>`],
     ["Radon–Nikodým dℚ/dℙ",`exp( −${θ2.toFixed(4)} W<sup>ℙ</sup><sub>T</sub> − ${(0.5*θ2**2*R.T).toFixed(5)} )`],
     ["Drift under ℚ",`<span class="math cR bold">r = ${rv}%</span> <span class="iNote">(μ̂ = ${μ2}% eliminated by measure change)</span>`],
     ["Pricing formula",`V<sub>0</sub> = e<sup>−rT</sup> · 𝔼<sup>ℚ</sup>[max(Ā<sub>T</sub> − K, 0)]`],
     ["MC simulation",`N = ${R.nPaths.toLocaleString()} paths · n = ${params.nSteps} steps · exact log-normal scheme`],
     [`<span class="math cRes bold">V̂</span><sub>0</sub>`,`<span class="math cRes bold" style="font-size:16px">${fmtP(R.key,R.price)}</span> &ensp; 95% CI: [${fmtP(R.key,R.ci[0])}, ${fmtP(R.key,R.ci[1])}]`],
    ].forEach(([k,v])=>{
      const tr=el("tr");tr.innerHTML=`<td>${k}</td><td>${v}</td>`;stb.appendChild(tr);
    });
    stbl.appendChild(stb);sc.appendChild(stbl);frag.appendChild(sc);
  }

  const ct=document.getElementById("content");ct.innerHTML="";ct.appendChild(frag);

  if(results&&results.key===sel){
    const R=results,ac2=AC[R.key];
    requestAnimationFrame(()=>{
      dc("paths");
      const ctx1=document.getElementById("cPaths");
      if(ctx1&&R.pathD.length){
        charts.paths=new Chart(ctx1,{type:"line",
          data:{labels:R.pathD.map(d=>d.t.toFixed(2)),
            datasets:Array.from({length:R.pathD[0].vals.length},(_,j)=>({
              data:R.pathD.map(d=>d.vals[j]),
              borderColor:PAL[j%PAL.length],borderWidth:1.2,
              pointRadius:0,fill:false,tension:0.1,spanGaps:true,
            }))},
          options:{responsive:true,maintainAspectRatio:false,animation:{duration:200},
            plugins:{legend:{display:false},tooltip:{enabled:false}},
            scales:{
              x:{ticks:{font:{size:9},maxTicksLimit:10},title:{display:true,text:"Time t (years)",font:{size:11}}},
              y:{ticks:{font:{size:10},callback:v=>fmtY(R.key,v)},
                 title:{display:true,text:`Price (${DB[R.key].currency||"USD"})`,font:{size:11}}}
            }
          }
        });
      }
      dc("payoff");
      const ctx2=document.getElementById("cPayoff");
      if(ctx2){
        const data=R.histD.slice(0,23);
        charts.payoff=new Chart(ctx2,{type:"bar",
          data:{labels:data.map(d=>d.label),
            datasets:[{label:"Frequency",data:data.map(d=>d.cnt),backgroundColor:ac2+"cc",borderRadius:3}]},
          options:{responsive:true,maintainAspectRatio:false,animation:{duration:200},
            plugins:{legend:{display:false},tooltip:{callbacks:{label:cx=>`Count: ${cx.raw}`},displayColors:false}},
            scales:{
              x:{ticks:{font:{size:9},maxRotation:45},
                 title:{display:true,text:`Payoff  max(Ā\u209c − K, 0)  (${DB[R.key].currency||"USD"})`,font:{size:11}}},
              y:{ticks:{font:{size:9}},
                 title:{display:true,text:"Frequency (# paths)",font:{size:11}}}
            }
          }
        });
      }
    });
  }
}

function render(){
  Object.keys(charts).forEach(dc);
  renderAssets();renderTabs();
  if(tab==="data")renderData();
  else if(tab==="theory")renderTheory();
  else renderSim();
}

loadLiveData();
</script>
